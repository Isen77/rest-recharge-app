#  Rest & Recharge Dashboard — User Authentication Config
#
#  HOW TO ADD / CHANGE PASSWORDS:
#  1. Run this command in your terminal to generate a hash:
#     python3 -c "import streamlit_authenticator as s; print(s.Hasher(['YourPassword123']).generate()[0])"
